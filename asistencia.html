<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="img/logo.png" />
  <title>Asistencia del Personal</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div id="nav-container"></div>

  <div class="dashboard-container">

    <div class="filtros insumos">

      <div class="filtro-grupo">
        <label for="filtro-empleado">Empleado:</label>
        <select id="filtro-empleado">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label for="filtro-tipo">Tipo:</label>
        <select id="filtro-tipo">
          <option value="">Todos</option>
          <option value="entrada">↑ Entrada</option>
          <option value="salida">↓ Salida</option>
          <option value="salida_almuerzo">🍽 Salida almuerzo</option>
          <option value="regreso_almuerzo">↩ Regreso almuerzo</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label for="filtro-localidad">Localidad:</label>
        <select id="filtro-localidad">
          <option value="">Todas</option>
          <option value="MATRIZ">MATRIZ</option>
          <option value="SUCURSAL">SUCURSAL</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label for="fecha-desde">Desde:</label>
        <input type="date" id="fecha-desde">
      </div>

      <div class="filtro-grupo">
        <label for="fecha-hasta">Hasta:</label>
        <input type="date" id="fecha-hasta">
      </div>

      <div class="filtro-grupo" style="display:flex;align-items:flex-end;">
        <button id="btn-config" title="Configurar horarios" style="
          background: var(--primary);
          color: #fff;
          border: none;
          border-radius: var(--r-md);
          padding: 6px 14px;
          cursor: pointer;
          font-size: 14px;
          height: 38px;
          display: flex;
          align-items: center;
          gap: 6px;
        ">⚙️ Configuración</button>
      </div>

    </div>

    <div class="tabla-estandar-wrap">
    <table class="tabla-estandar">
      <thead>
        <tr>
          <th>#</th>
          <th>Empleado</th>
          <th>Localidad</th>
          <th>Tipo</th>
          <th>Fecha / Hora</th>
          <th>Foto</th>
        </tr>
      </thead>
      <tbody id="tabla-asistencia"></tbody>
    </table>
    </div>

    <div class="pagination-controls">
      <button id="btn-prev">Anterior</button>
      <span id="page-info">Página 1</span>
      <button id="btn-next">Siguiente</button>
    </div>

  </div>

  <!-- ===== Modal Configuración ===== -->
  <div id="modal-config" class="modal" style="display:none;">
    <div class="modal-box" style="
      background:#fff;
      border-radius: var(--r-lg);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      position: relative;
      box-shadow: var(--shadow-lg);
    ">
      <span id="btn-cerrar-config" style="
        position:absolute;top:16px;right:20px;
        font-size:22px;cursor:pointer;color:var(--text-light);
      ">&times;</span>

      <h2 style="margin:0 0 6px;color:var(--primary);font-size:18px;">⚙️ Configuración de horarios</h2>
      <p style="margin:0 0 24px;color:var(--text-light);font-size:13px;">
        Define el rango de horario de almuerzo por localidad.<br>
        El sistema usará estos rangos para detectar automáticamente las salidas y regresos de almuerzo.
      </p>

      <!-- MATRIZ -->
      <div class="config-card">
        <p class="config-card-title">🏢 MATRIZ</p>
        <div class="config-row">
          <div>
            <label>Inicio almuerzo</label>
            <input type="time" id="cfg-matriz-inicio">
          </div>
          <div>
            <label>Fin almuerzo</label>
            <input type="time" id="cfg-matriz-fin">
          </div>
        </div>
      </div>

      <!-- SUCURSAL -->
      <div class="config-card" style="margin-bottom:24px;">
        <p class="config-card-title">🏪 SUCURSAL</p>
        <div class="config-row">
          <div>
            <label>Inicio almuerzo</label>
            <input type="time" id="cfg-sucursal-inicio">
          </div>
          <div>
            <label>Fin almuerzo</label>
            <input type="time" id="cfg-sucursal-fin">
          </div>
        </div>
      </div>

      <button id="btn-guardar-config" style="
        width:100%;
        background:var(--primary);
        color:#fff;
        border:none;
        border-radius:var(--r-md);
        padding:10px;
        font-size:15px;
        cursor:pointer;
        font-weight:600;
      ">Guardar cambios</button>
    </div>
  </div>

  <!-- Modal foto -->
  <div id="modal-foto-asistencia" class="modal" style="display:none;">
    <div class="zoom-container">
      <span class="cerrar" id="btn-cerrar-modal">&times;</span>
      <img class="modal-contenido" id="foto-modal-img" alt="Evidencia de asistencia">
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/asistencia.js"></script>
</body>
</html>
