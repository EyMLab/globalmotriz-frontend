<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="img/logo.png" />
  <title>Iniciar Sesión - Global Motriz</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="login">
  <div class="login-container">
    <div class="logo">
      <img src="img/logo.png" alt="Logo Global Motriz" class="logo-img">
    </div>

    <h2>Iniciar Sesión</h2>

    <form id="login-form" novalidate>
      <div class="login-field">
        <label for="usuario" class="sr-only">Usuario</label>
        <input
          type="text"
          id="usuario"
          name="usuario"
          placeholder="Usuario"
          autocomplete="username"
          autofocus
          required
        />
      </div>

      <div class="login-field login-field-password">
        <label for="password" class="sr-only">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Contraseña"
          autocomplete="current-password"
          required
        />
        <button
          type="button"
          id="toggle-password"
          class="toggle-password-btn"
          aria-label="Mostrar contraseña"
          tabindex="-1"
        >
          <svg class="icon-eye icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="icon-eye icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <p id="capslock-warning" class="capslock-warning" hidden>
        <span aria-hidden="true">⚠</span> Mayúsculas activadas
      </p>

      <button type="submit" id="btn-entrar">Entrar</button>
    </form>

    <div id="mensaje-error" class="login-error" role="alert" aria-live="polite" hidden></div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
