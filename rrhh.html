<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRHH - Empleados</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

  <!-- NAVBAR -->
  <div id="nav-container"></div>

  <div class="dashboard-container">

    <!-- =========================
         SECCIÓN: INFO EMPLEADOS
    ========================== -->
    <div class="section-header" style="margin-bottom:12px;">
      <h2>Informacion de Empleados</h2>
    </div>

    <!-- Filtros -->
    <div class="filter-row" style="margin-bottom:16px;">
      <input id="buscar-empleado" class="swal2-input" placeholder="Buscar por nombre o cédula..."
             style="width:260px;margin:0;height:36px;font-size:13px;">
      <select id="filtro-localidad-rrhh" class="filter-select-md">
        <option value="">Todas las localidades</option>
        <option value="MATRIZ">MATRIZ</option>
        <option value="SUCURSAL">SUCURSAL</option>
      </select>
      <select id="filtro-cargo-rrhh" class="filter-select-md">
        <option value="">Todos los cargos</option>
      </select>
      <select id="filtro-estado-rrhh" class="filter-select-md">
        <option value="activo">Activos</option>
        <option value="inactivo">Inactivos</option>
        <option value="">Todos</option>
      </select>
    </div>

    <div id="contador-empleados" style="margin-bottom:8px;font-size:14px;color:#374151;font-weight:600;"></div>

    <table>
      <thead>
        <tr>
          <th style="width:45px;text-align:center;">#</th>
          <th>Nombre Completo</th>
          <th>Cedula</th>
          <th>Fecha Nacimiento</th>
          <th>Fecha Ingreso</th>
          <th>Localidad</th>
          <th>Cargo</th>
          <th>Estado</th>
          <th class="col-acciones-rrhh">Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-info-empleados"></tbody>
    </table>

  </div>

  <!-- JS -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/rrhh.js"></script>

</body>
</html>
