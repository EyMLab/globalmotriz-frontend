<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RRHH - Recursos Humanos</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

  <!-- NAVBAR -->
  <div id="nav-container"></div>

  <div class="dashboard-container">

    <!-- =========================
         SECCIÓN: INFO EMPLEADOS
    ========================== -->
    <div class="section-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
      <h2>Informacion de Empleados</h2>
      <input id="buscar-empleado" class="swal2-input" placeholder="Buscar por nombre o cedula..."
             style="width:280px;margin:0;height:36px;font-size:13px;">
    </div>

    <table>
      <thead>
        <tr>
          <th>Nombre Completo</th>
          <th>Cedula</th>
          <th>Fecha Nacimiento</th>
          <th>Localidad</th>
          <th>Cargo</th>
          <th>Estado</th>
          <th class="col-acciones-rrhh">Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-info-empleados"></tbody>
    </table>

    <hr style="margin:40px 0;">

    <!-- =========================
         SECCIÓN: CUMPLEAÑOS
    ========================== -->
    <div class="section-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
      <h2>Calendario de Cumpleanos</h2>
      <select id="filtro-anio" class="swal2-select" style="width:120px;margin:0;height:36px;font-size:13px;"></select>
    </div>

    <div id="cumpleanos-calendar" class="cumpleanos-grid"></div>

  </div>

  <!-- JS -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/rrhh.js"></script>

</body>
</html>
